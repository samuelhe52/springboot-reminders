services:
    mysql:
        image: mysql:8.4
        container_name: reminder-mysql
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: reminder_db
            TZ: Asia/Shanghai
        volumes:
            - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
